[paths]
# Nuage de points feuilles en entree pour le clustering.
input_las = "/Users/noedaniel/Documents/Stage IRD/CLUSTER_FINAL/scene_leaves.las"

# LAS/LAZ clusterise contenant le champ cluster_id.
# Utilise par l'etape mesh. Si step=all, ce chemin est remplace automatiquement
# par la sortie du clustering.
clustered_las = "/Users/noedaniel/Documents/Stage IRD/GITHUB/outputs/clustering/run_01/sor_tiled_hdbscan.las"

output_root = "/Users/noedaniel/Documents/Stage IRD/GITHUB/outputs"

[clustering]
# True si on souhaite appliquer le filtre SOR avant clustering.
enable_sor = true   

# Hyperparametres du SOR.
sor_nb_neighbors = 30
sor_std_ratio = 1.0

# True si on souhaite diviser la scène en sous-cubes avant clustering.
# Je recommande si on a des grosses scènes.
enable_tiling = true
tile_size_xyz_m = [0.5, 0.5, 0.5]
min_points_per_tile = 120

# Hyperparametres du HDBSCAN.
hdbscan_min_cluster_size = 300
hdbscan_min_samples = 5
hdbscan_cluster_selection_epsilon = 0.0
hdbscan_cluster_selection_method = "eom"

# Pour avoir un .laz coloré avec les clusters.
export_colored_las = true

[meshing]
cluster_field = "cluster_id"
noise_label = -1
min_points_cluster = 150
start_cluster_id = 0
end_cluster_id = 10000000

# Je conseille de laisser poisson_depth à 6 ou 7 pour des scènes de feuilles. Plus haut, ça peut faire du sur-meshing.
poisson_depth = 6
normal_radius = 0.02
normal_max_nn = 100
orient_k = 10

# max_dist facteur pour savoir ou couper la surface.
max_dist_factor = 2.0
fill_poisson_holes = true
# aire maximum d'un trou à remplir en cm2. 
max_hole_area_cm2 = 15.0

# Laisser tel quel, j'ai déjà optimisé ces paramètres pour les scènes de feuilles.
subdiv_iter = 2
laplacian_iter = 100
taubin_iter = 40
taubin_lambda = 0.5
taubin_mu = -0.55

fill_after_smooth = true
max_hole_area_after_smooth_cm2 = 15.0

# Voxeliser avant permet de réduire le nombre de points et d'avoir des maillages plus légers.
voxel_size_per_cluster = 0.005
max_points_per_cluster = 30000
export_per_cluster_meshes = false
export_per_cluster_poisson_raw = false
